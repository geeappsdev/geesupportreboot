<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gee Support AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>

<style>
body{
background:#0f172a;
}
</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState}=React



const FORMAT_TEMPLATES={

EMAIL:`
**SUMMARY**

`,

`,

INVESTIGATION:`

User account type: NA

Read entire thread? YES

**User concerns**

**Summary of the issue**

**Check Lumos**
NA

**Public documentation used**

**Dashboard link**
NA

**Final Outcome**

**Why case open/pending**

**Distressed User Analysis**

**Information the reply must include**

SUMMARY:`
**Summary of the issue**

Case link: NA
Case ID: NA
Account ID: NA

**Speculation**

**What can I tell the user?**

**Relevant Stripe resources**
•

`,

CONSULT:`

`

}



function detectStripeIDs(text){

const patterns=[
/acct_[A-Za-z0-9]+/g,
/pi_[A-Za-z0-9]+/g,
/ch_[A-Za-z0-9]+/g,
/cus_[A-Za-z0-9]+/g,
/evt_[A-Za-z0-9]+/g,
/tr_[A-Za-z0-9]+/g,
/po_[A-Za-z0-9]+/g,
/in_[A-Za-z0-9]+/g,
/sub_[A-Za-z0-9]+/g,
/pm_[A-Za-z0-9]+/g,
/seti_[A-Za-z0-9]+/g,
/cs_[A-Za-z0-9]+/g,
/price_[A-Za-z0-9]+/g,
/prod_[A-Za-z0-9]+/g
]

let ids=[]

patterns.forEach(p=>{
const m=text.match(p)
if(m){ids.push(...m)}
})

return [...new Set(ids)]

}



function detectStripeProduct(text){

text=text.toLowerCase()

if(text.includes("subscription")||text.includes("invoice")) return "Billing"
if(text.includes("connect")||text.includes("platform")) return "Connect"
if(text.includes("webhook")) return "Webhooks"
if(text.includes("checkout")) return "Checkout"
if(text.includes("fraud")||text.includes("dispute")) return "Radar"
if(text.includes("tax")) return "Tax"
if(text.includes("identity")) return "Identity"
if(text.includes("terminal")) return "Terminal"
if(text.includes("payment")||text.includes("charge")) return "Payments"

return "General API"

}



function App(){

const [apiKey,setApiKey]=useState(localStorage.getItem("geminiKey")||"")
const [alias,setAlias]=useState(localStorage.getItem("alias")||"")
const [context,setContext]=useState("")
const [output,setOutput]=useState("")
const [loading,setLoading]=useState(false)



function save(){

localStorage.setItem("geminiKey",apiKey)
localStorage.setItem("alias",alias)

alert("Settings saved")

}



async function generate(type){

if(!apiKey){
alert("Enter Gemini API key")
return
}

if(!context.trim()){
alert("Enter case context")
return
}

setLoading(true)

const ids=detectStripeIDs(context)
const product=detectStripeProduct(context)

const template=FORMAT_TEMPLATES[type].replace("{alias}",alias||"Agent")

const prompt=`

You are a Stripe support documentation AI.

Agent alias: ${alias}

Stripe product detected:
${product}

Detected Stripe IDs:
${ids.length?ids.join(", "):"NA"}

CASE CONTEXT
${context}

Fill the template below.

Rules:

Do not modify headings.
Do not remove sections.
Fill all sections concisely.

Template:
${template}

`

const response=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{text:prompt}
]
}
]
})
}
)

const data=await response.json()

let text="AI generation failed"

if(data.candidates){
text=data.candidates[0].content.parts.map(p=>p.text).join("")
}

setOutput(text)
setLoading(false)

}



const ids=detectStripeIDs(context)
const product=detectStripeProduct(context)



return(

<div className="p-6 text-white">

Gee Support AI
</h1>


<div className="bg-slate-800 p-4 rounded mb-4">

<div className="flex gap-2">

<input
className="flex-1 p-2 rounded text-black"
placeholder="Gemini API key"
value={apiKey}
onChange={e=>setApiKey(e.target.value)}
/>

<input
className="flex-1 p-2 rounded text-black"
placeholder="Agent Alias"
value={alias}
onChange={e=>setAlias(e.target.value)}
/>

<button
onClick={save}
className="bg-green-600 px-4 py-2 rounded"
>
Save
</button>

</div>

</div>



<div className="bg-slate-800 p-4 rounded mb-4">

<h2 className="font-bold mb-2">Case Context</h2>

<textarea
rows="8"
className="w-full p-3 text-black rounded"
value={context}
onChange={e=>setContext(e.target.value)}
/>

</div>



<div className="bg-slate-700 p-3 rounded mb-4">

<h3 className="font-bold">Stripe Product Detected</h3>
<p>{product}</p>

</div>



{ids.length>0 &&(

<div className="bg-slate-700 p-3 rounded mb-4">

<h3 className="font-bold">Detected Stripe IDs</h3>

<pre>{ids.join("\n")}</pre>

</div>

)}



<div className="flex gap-3 mb-4 flex-wrap">

<button onClick={()=>generate("EMAIL")} className="bg-purple-600 px-4 py-2 rounded">
Email Draft
</button>

<button onClick={()=>generate("CHAT")} className="bg-blue-600 px-4 py-2 rounded">
Chat/RAC Notes
</button>

<button onClick={()=>generate("INVESTIGATION")} className="bg-orange-600 px-4 py-2 rounded">
Investigation Notes
</button>

<button onClick={()=>generate("SUMMARY")} className="bg-yellow-600 px-4 py-2 rounded">
Quick Summary
</button>

<button onClick={()=>generate("CONSULT")} className="bg-green-600 px-4 py-2 rounded">
Consult
</button>

</div>



<div className="bg-slate-800 p-4 rounded">

<h2 className="font-bold mb-2">Generated Output</h2>

{loading && <p>Generating...</p>}

<pre className="bg-white text-black p-3 rounded whitespace-pre-wrap">
{output}
</pre>

</div>

</div>

</div>

)

}



ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>
